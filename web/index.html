<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>System-tools Diagnostics Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  [x-cloak] { display: none !important; }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif; }
  pre, code, .mono { font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace; }
  .drop-active { background: #EEF2FF; border-color: #4F46E5 !important; }
  .scrollbar-thin::-webkit-scrollbar { width: 10px; height: 10px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 5px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body class="bg-white text-gray-900" x-cloak>

<div x-data="dashboard()" x-init="init()" class="min-h-screen flex flex-col">

  <!-- ======== Header ======== -->
  <header class="border-b border-gray-200 px-8 py-4 flex items-center justify-between bg-white">
    <div>
      <div class="text-[11px] font-semibold uppercase text-indigo-600 tracking-[0.08em]">System-tools</div>
      <div class="text-xl font-semibold leading-tight">Diagnostics Dashboard</div>
    </div>
    <div class="flex items-center gap-3" x-show="runs.length > 0">
      <span class="text-xs text-gray-500" x-text="loadedSource"></span>
      <button @click="clearData"
              class="text-sm text-gray-600 hover:text-gray-900 px-3 py-1.5 rounded-md border border-gray-200 hover:bg-gray-50">
        Clear
      </button>
      <button @click="$refs.fileInput.click()"
              class="bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-md hover:bg-indigo-700 shadow-sm">
        Reload file
      </button>
    </div>
  </header>

  <!-- ======== Body ======== -->
  <div class="flex-1 flex bg-gray-50">

    <!-- Empty state -->
    <div x-show="runs.length === 0" class="flex-1 flex items-center justify-center p-12">
      <div @drop.prevent="handleDrop($event)"
           @dragenter.prevent="$el.classList.add('drop-active')"
           @dragover.prevent
           @dragleave.prevent="$el.classList.remove('drop-active')"
           class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center max-w-2xl bg-white transition-colors">
        <svg class="mx-auto mb-4 w-12 h-12 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
        </svg>
        <div class="text-lg font-semibold">Load your diagnostics history</div>
        <p class="text-gray-600 mt-2">
          Drop your <span class="mono bg-gray-100 px-1.5 py-0.5 rounded text-sm">diagnostics-history.json</span> here,
          or click below.
        </p>
        <button @click="$refs.fileInput.click()"
                class="mt-6 bg-indigo-600 text-white font-semibold px-6 py-3 rounded-md hover:bg-indigo-700 shadow-sm">
          Choose file
        </button>
        <p class="text-xs text-gray-500 mt-8">
          Default location:
          <span class="mono bg-gray-100 px-1.5 py-0.5 rounded">%USERPROFILE%\diagnostics-history.json</span>
        </p>
        <p class="text-xs text-gray-500 mt-2">
          Generated by <span class="mono">system-tools/diagnostics/system-diagnostics.ps1</span>.
        </p>
      </div>
    </div>

    <!-- Loaded state: sidebar + content -->
    <template x-if="runs.length > 0">
      <div class="flex-1 flex">

        <!-- Sidebar -->
        <nav class="w-52 border-r border-gray-200 bg-white py-3 flex-shrink-0">
          <template x-for="tab in tabs" :key="tab.id">
            <button @click="setTab(tab.id)"
                    :class="activeTab === tab.id
                      ? 'bg-indigo-50 text-indigo-700 border-l-[3px] border-indigo-600'
                      : 'border-l-[3px] border-transparent hover:bg-gray-50 text-gray-700'"
                    class="w-full text-left px-5 py-2.5 text-sm font-medium transition-colors">
              <span x-text="tab.label"></span>
              <span x-show="tab.id === 'history'" class="text-xs text-gray-400 ml-1"
                    x-text="'(' + runs.length + ')'"></span>
            </button>
          </template>
        </nav>

        <!-- Content -->
        <main class="flex-1 overflow-auto scrollbar-thin">

          <!-- ===== Overview ===== -->
          <section x-show="activeTab === 'overview'" class="p-8">
            <h1 class="text-lg font-semibold mb-1">Overview</h1>
            <p class="text-sm text-gray-500 mb-6"
               x-text="'From ' + formatDate(stats.firstRun) + ' to ' + formatDate(stats.lastRun)"></p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
              <div class="bg-white rounded-lg border border-gray-200 p-4">
                <div class="text-3xl font-semibold" x-text="stats.total"></div>
                <div class="text-xs uppercase tracking-wider text-gray-500 mt-1">Runs</div>
              </div>
              <div class="bg-white rounded-lg border border-gray-200 p-4">
                <div class="text-3xl font-semibold text-green-700" x-text="stats.ok"></div>
                <div class="text-xs uppercase tracking-wider text-gray-500 mt-1">OK verdicts</div>
              </div>
              <div class="bg-white rounded-lg border border-gray-200 p-4">
                <div class="text-3xl font-semibold text-amber-700" x-text="stats.warn"></div>
                <div class="text-xs uppercase tracking-wider text-gray-500 mt-1">Warnings</div>
              </div>
              <div class="bg-white rounded-lg border border-gray-200 p-4">
                <div class="text-3xl font-semibold text-red-700" x-text="stats.fail"></div>
                <div class="text-xs uppercase tracking-wider text-gray-500 mt-1">Failures</div>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
              <div class="bg-white rounded-lg border border-gray-200 p-5">
                <div class="text-xs uppercase tracking-wider text-gray-500 mb-3 font-semibold">Hosts</div>
                <template x-for="[h, n] in byHost" :key="h">
                  <div class="flex justify-between py-1.5 border-b last:border-0 border-gray-100">
                    <span class="text-sm font-medium" x-text="h"></span>
                    <span class="text-sm text-gray-500" x-text="n + ' runs'"></span>
                  </div>
                </template>
              </div>
              <div class="bg-white rounded-lg border border-gray-200 p-5">
                <div class="text-xs uppercase tracking-wider text-gray-500 mb-3 font-semibold">Projects</div>
                <template x-for="[p, n] in byProject" :key="p">
                  <div class="flex justify-between py-1.5 border-b last:border-0 border-gray-100">
                    <span class="text-sm font-medium" x-text="p"></span>
                    <span class="text-sm text-gray-500" x-text="n + ' runs'"></span>
                  </div>
                </template>
              </div>
            </div>

            <div class="bg-white rounded-lg border border-gray-200 p-5">
              <div class="text-xs uppercase tracking-wider text-gray-500 mb-3 font-semibold">Latest run</div>
              <template x-if="latestRun">
                <div>
                  <div class="flex items-center justify-between mb-3">
                    <div>
                      <div class="font-semibold" x-text="formatDate(latestRun.ts)"></div>
                      <div class="text-sm text-gray-500"
                           x-text="latestRun.host + '  /  ' + latestRun.project + '  /  v' + (latestRun.version || '?')"></div>
                    </div>
                    <div class="flex gap-1.5">
                      <span class="pill ok"   x-text="latestRun.counts?.OK || 0"></span>
                      <span class="pill warn" x-text="latestRun.counts?.WARN || 0"></span>
                      <span class="pill fail" x-text="latestRun.counts?.FAIL || 0"></span>
                    </div>
                  </div>
                  <button @click="setTab('history'); selectedRun = latestRun"
                          class="text-sm text-indigo-600 hover:underline">View verdicts -></button>
                </div>
              </template>
            </div>
          </section>

          <!-- ===== History ===== -->
          <section x-show="activeTab === 'history'" class="p-8">
            <div class="flex items-baseline justify-between mb-5">
              <h1 class="text-lg font-semibold">History</h1>
              <div class="flex gap-2">
                <input x-model="filter" type="search" placeholder="Filter (verdict text, host, project)..."
                       class="text-sm border border-gray-300 rounded-md px-3 py-1.5 w-80 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
                <select x-model="filterProject"
                        class="text-sm border border-gray-300 rounded-md px-3 py-1.5">
                  <option value="">All projects</option>
                  <template x-for="p in [...new Set(runs.map(r => r.project))]" :key="p">
                    <option :value="p" x-text="p"></option>
                  </template>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
              <div class="lg:col-span-1 bg-white rounded-lg border border-gray-200 overflow-hidden">
                <div class="max-h-[600px] overflow-auto scrollbar-thin">
                  <template x-for="r in filteredRuns" :key="r.ts + r.host">
                    <button @click="selectedRun = r"
                            :class="selectedRun === r ? 'bg-indigo-50' : 'hover:bg-gray-50'"
                            class="w-full text-left px-4 py-3 border-b border-gray-100 transition-colors">
                      <div class="flex items-center justify-between mb-1">
                        <div class="font-semibold text-sm" x-text="formatDate(r.ts)"></div>
                        <div class="flex gap-1">
                          <span class="pill ok"   x-text="r.counts?.OK || 0"></span>
                          <span class="pill warn" x-text="r.counts?.WARN || 0"></span>
                          <span class="pill fail" x-text="r.counts?.FAIL || 0"></span>
                        </div>
                      </div>
                      <div class="text-xs text-gray-500"
                           x-text="r.project + ' / ' + r.host + (r.version ? '  /  v' + r.version : '')"></div>
                    </button>
                  </template>
                  <div x-show="filteredRuns.length === 0" class="p-8 text-center text-gray-400 text-sm">
                    No runs match the filter.
                  </div>
                </div>
              </div>

              <div class="lg:col-span-2 bg-white rounded-lg border border-gray-200 overflow-hidden">
                <template x-if="selectedRun">
                  <div>
                    <div class="px-5 py-4 border-b border-gray-200 bg-gray-50">
                      <div class="font-semibold" x-text="formatDate(selectedRun.ts)"></div>
                      <div class="text-xs text-gray-500 mt-0.5"
                           x-text="selectedRun.project + '  /  ' + selectedRun.host + '  /  v' + (selectedRun.version || '?')"></div>
                      <div class="text-xs text-gray-400 mt-2 mono break-all"
                           x-text="selectedRun.reportDir"></div>
                    </div>
                    <div class="max-h-[540px] overflow-auto scrollbar-thin">
                      <template x-for="(v, i) in (selectedRun.verdicts || [])" :key="i">
                        <div :class="verdictBgClass(v)"
                             class="px-5 py-2 border-b border-gray-100 text-sm flex items-start gap-3">
                          <span :class="verdictPillClass(v)" class="pill mt-0.5"
                                x-text="verdictLevel(v)"></span>
                          <span class="flex-1" x-text="verdictMessage(v)"></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
                <div x-show="!selectedRun" class="p-12 text-center text-gray-400 text-sm">
                  Select a run from the left to inspect its verdicts.
                </div>
              </div>
            </div>
          </section>

          <!-- ===== Trends ===== -->
          <section x-show="activeTab === 'trends'" class="p-8">
            <h1 class="text-lg font-semibold mb-1">Trends</h1>
            <p class="text-sm text-gray-500 mb-6">
              OK / WARN / FAIL counts over the most recent 20 runs.
            </p>
            <div class="bg-white rounded-lg border border-gray-200 p-5" style="height: 480px;">
              <canvas id="trendChart"></canvas>
            </div>
          </section>

          <!-- ===== Recurring ===== -->
          <section x-show="activeTab === 'recurring'" class="p-8">
            <h1 class="text-lg font-semibold mb-1">Recurring verdicts</h1>
            <p class="text-sm text-gray-500 mb-6">
              WARN and FAIL verdicts that appear most often across the loaded history.
            </p>
            <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500">
                  <tr>
                    <th class="text-left px-5 py-3 w-20">Seen</th>
                    <th class="text-left px-5 py-3">Verdict</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in recurring" :key="row.verdict">
                    <tr class="border-t border-gray-100">
                      <td class="px-5 py-2.5 font-semibold" x-text="row.count + 'x'"></td>
                      <td class="px-5 py-2.5">
                        <span :class="verdictPillClass(row.verdict)" class="pill"
                              x-text="verdictLevel(row.verdict)"></span>
                        <span class="ml-2" x-text="verdictMessage(row.verdict)"></span>
                      </td>
                    </tr>
                  </template>
                  <tr x-show="recurring.length === 0">
                    <td colspan="2" class="px-5 py-12 text-center text-gray-400">
                      No recurring WARN/FAIL verdicts found across the loaded runs.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

        </main>
      </div>
    </template>
  </div>

  <!-- Hidden file input -->
  <input type="file" x-ref="fileInput" @change="handleFile($event)" accept=".json,application/json" class="hidden" />
</div>

<style>
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .pill.ok   { background: #DCFCE7; color: #15803D; }
  .pill.warn { background: #FEF3C7; color: #B45309; }
  .pill.fail { background: #FEE2E2; color: #B91C1C; }
</style>

<script>
function dashboard() {
  return {
    runs: [],
    activeTab: 'overview',
    selectedRun: null,
    filter: '',
    filterProject: '',
    loadedSource: '',
    _chart: null,
    tabs: [
      { id: 'overview',  label: 'Overview'  },
      { id: 'history',   label: 'History'   },
      { id: 'trends',    label: 'Trends'    },
      { id: 'recurring', label: 'Recurring' },
    ],

    init() {
      const cached = localStorage.getItem('diag-history');
      const source = localStorage.getItem('diag-history-source');
      if (cached) {
        try { this.runs = JSON.parse(cached); this.loadedSource = source || 'cached'; }
        catch {}
      }
      this.$watch('activeTab', (v) => { if (v === 'trends') this.$nextTick(() => this.renderTrendChart()); });
    },

    handleFile(e)  { const f = e.target.files?.[0];          if (f) this.readFile(f); },
    handleDrop(e)  { e.currentTarget.classList.remove('drop-active');
                     const f = e.dataTransfer.files?.[0];    if (f) this.readFile(f); },
    readFile(f) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!Array.isArray(parsed)) throw new Error('Expected a JSON array of run entries.');
          this.runs = parsed;
          this.loadedSource = f.name;
          this.selectedRun = null;
          try {
            localStorage.setItem('diag-history', ev.target.result);
            localStorage.setItem('diag-history-source', f.name);
          } catch {}
        } catch (err) {
          alert('Could not parse JSON: ' + err.message);
        }
      };
      reader.readAsText(f);
    },
    clearData() {
      this.runs = [];
      this.selectedRun = null;
      this.loadedSource = '';
      try { localStorage.removeItem('diag-history'); localStorage.removeItem('diag-history-source'); } catch {}
    },

    setTab(id) { this.activeTab = id; if (id === 'trends') this.$nextTick(() => this.renderTrendChart()); },

    // ---- Computed ----
    get sortedRuns() {
      return [...this.runs].sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));
    },
    get filteredRuns() {
      const f = this.filter.trim().toLowerCase();
      const p = this.filterProject;
      return this.sortedRuns.filter(r => {
        if (p && r.project !== p) return false;
        if (!f) return true;
        if ((r.host || '').toLowerCase().includes(f)) return true;
        if ((r.project || '').toLowerCase().includes(f)) return true;
        if ((r.ts || '').toLowerCase().includes(f)) return true;
        return (r.verdicts || []).some(v => v.toLowerCase().includes(f));
      });
    },
    get latestRun() { return this.sortedRuns[0] || null; },
    get stats() {
      const s = { total: this.runs.length, ok: 0, warn: 0, fail: 0,
                  firstRun: '', lastRun: '' };
      for (const r of this.runs) {
        s.ok   += r.counts?.OK   || 0;
        s.warn += r.counts?.WARN || 0;
        s.fail += r.counts?.FAIL || 0;
      }
      const sorted = this.sortedRuns;
      s.firstRun = sorted[sorted.length - 1]?.ts || '';
      s.lastRun  = sorted[0]?.ts || '';
      return s;
    },
    get byHost() {
      const m = new Map();
      for (const r of this.runs) m.set(r.host, (m.get(r.host) || 0) + 1);
      return [...m.entries()].sort((a, b) => b[1] - a[1]);
    },
    get byProject() {
      const m = new Map();
      for (const r of this.runs) m.set(r.project, (m.get(r.project) || 0) + 1);
      return [...m.entries()].sort((a, b) => b[1] - a[1]);
    },
    get recurring() {
      const tally = new Map();
      for (const r of this.runs)
        for (const v of (r.verdicts || []))
          if (v.startsWith('[WARN]') || v.startsWith('[FAIL]'))
            tally.set(v, (tally.get(v) || 0) + 1);
      return [...tally.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, 25)
        .map(([verdict, count]) => ({ verdict, count }));
    },

    // ---- Verdict parsing ----
    verdictLevel(v) {
      const m = /^\[(OK|WARN|FAIL)\]/.exec(v);
      return m ? m[1] : '';
    },
    verdictMessage(v) { return v.replace(/^\[(OK|WARN|FAIL)\]\s*/, ''); },
    verdictPillClass(v) {
      if (v.startsWith('[OK]'))   return 'ok';
      if (v.startsWith('[WARN]')) return 'warn';
      if (v.startsWith('[FAIL]')) return 'fail';
      return '';
    },
    verdictBgClass(v) {
      if (v.startsWith('[FAIL]')) return 'bg-red-50/40';
      if (v.startsWith('[WARN]')) return 'bg-amber-50/40';
      return '';
    },

    // ---- Formatting ----
    formatDate(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (isNaN(d.getTime())) return ts;
      return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
    },

    // ---- Chart ----
    renderTrendChart() {
      const el = document.getElementById('trendChart');
      if (!el) return;
      if (this._chart) { this._chart.destroy(); this._chart = null; }
      const window = this.sortedRuns.slice(0, 20).reverse();
      this._chart = new Chart(el, {
        type: 'line',
        data: {
          labels: window.map(r => this.formatDate(r.ts)),
          datasets: [
            { label: 'OK',   data: window.map(r => r.counts?.OK   || 0), borderColor: '#15803D', backgroundColor: 'rgba(21,128,61,0.1)', tension: 0.3 },
            { label: 'WARN', data: window.map(r => r.counts?.WARN || 0), borderColor: '#B45309', backgroundColor: 'rgba(180,83,9,0.1)',  tension: 0.3 },
            { label: 'FAIL', data: window.map(r => r.counts?.FAIL || 0), borderColor: '#B91C1C', backgroundColor: 'rgba(185,28,28,0.1)', tension: 0.3 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { position: 'top', labels: { boxWidth: 14, font: { size: 12 } } } },
          scales: {
            x: { ticks: { font: { size: 10 }, maxRotation: 0, autoSkip: true } },
            y: { beginAtZero: true, ticks: { precision: 0 } },
          },
        },
      });
    },
  };
}
</script>
</body>
</html>
